<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mycelium Pulse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0608;
      font-family: 'Courier New', monospace;
    }
    #game-canvas { display: block; touch-action: none; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #9f7fff;
      font-size: 14px;
      text-shadow: 0 0 10px #9f7fff, 0 0 20px #4f7fff;
      z-index: 100;
      pointer-events: none;
    }
    #ui h1 {
      font-size: 24px;
      margin-bottom: 10px;
      letter-spacing: 3px;
    }
    #stats {
      margin-top: 15px;
      line-height: 1.8;
    }
    #timer {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #ff6b9d;
      font-size: 28px;
      text-shadow: 0 0 15px #ff6b9d;
      z-index: 100;
    }
    #message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 32px;
      text-shadow: 0 0 30px #9f7fff, 0 0 60px #4f7fff;
      z-index: 200;
      text-align: center;
      display: none;
    }
    #message .sub {
      font-size: 16px;
      margin-top: 20px;
      color: #9f7fff;
    }
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #6a5a8f;
      font-size: 12px;
      text-align: center;
      z-index: 100;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/dist/Tone.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
  
  <div id="ui">
    <h1>MYCELIUM PULSE</h1>
    <div id="stats">
      Trees Connected: <span id="trees-connected">0</span> / <span id="trees-total">5</span><br>
      Network Health: <span id="health">100</span>%
    </div>
  </div>
  <div id="timer">60</div>
  <div id="message">
    <div id="message-text"></div>
    <div class="sub">Click to restart</div>
  </div>
  <div id="instructions">Move mouse to guide tendrils • Connect trees before winter • Avoid rocks & toxic zones</div>
  
  <script type="module">
    import * as THREE from 'three';
    
    // Game state
    const state = {
      treesConnected: 0,
      treesTotal: 5,
      health: 100,
      timeLeft: 60,
      gameOver: false,
      won: false,
      mouseX: 0,
      mouseY: 0,
      tendrilNodes: [],
      connectedTrees: new Set(),
      obstacles: []
    };
    
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0608);
    scene.fog = new THREE.FogExp2(0x0a0608, 0.015);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.id = 'game-canvas';
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x1a0a2e, 0.3);
    scene.add(ambientLight);
    
    const mainLight = new THREE.PointLight(0x6a3fff, 2, 100);
    mainLight.position.set(0, 20, 0);
    scene.add(mainLight);
    
    const accentLight = new THREE.PointLight(0x00ffff, 1, 60);
    accentLight.position.set(-15, 15, -10);
    scene.add(accentLight);
    
    const warmLight = new THREE.PointLight(0xff6b9d, 0.8, 50);
    warmLight.position.set(15, 10, 10);
    scene.add(warmLight);
    
    // Ground - dark earth cross-section
    const groundGeometry = new THREE.PlaneGeometry(120, 120, 50, 50);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x1a0a10,
      emissive: 0x050208,
      roughness: 0.9,
      metalness: 0.1,
      wireframe: false
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    scene.add(ground);
    
    // Add earth texture detail
    const earthPoints = [];
    for (let i = 0; i < 200; i++) {
      earthPoints.push(new THREE.Vector3(
        (Math.random() - 0.5) * 100,
        -1.5 + Math.random() * 0.5,
        (Math.random() - 0.5) * 100
      ));
    }
    const earthGeom = new THREE.BufferGeometry().setFromPoints(earthPoints);
    const earthMat = new THREE.PointsMaterial({ color: 0x2a1520, size: 0.3 });
    scene.add(new THREE.Points(earthGeom, earthMat));
    
    // Central spore (starting point)
    const sporeGeometry = new THREE.SphereGeometry(1.5, 32, 32);
    const sporeMaterial = new THREE.MeshStandardMaterial({
      color: 0x9f7fff,
      emissive: 0x6a3fff,
      emissiveIntensity: 0.8,
      roughness: 0.3,
      metalness: 0.5
    });
    const spore = new THREE.Mesh(sporeGeometry, sporeMaterial);
    spore.position.set(0, 0, 0);
    scene.add(spore);
    
    // Spore glow
    const sporeGlow = new THREE.PointLight(0x9f7fff, 3, 20);
    spore.position.copy(spore.position);
    scene.add(sporeGlow);
    
    // Trees (roots visible above ground)
    const trees = [];
    const treePositions = [
      { x: -20, z: -15 },
      { x: 18, z: -12 },
      { x: -15, z: 18 },
      { x: 22, z: 15 },
      { x: 0, z: 25 }
    ];
    
    treePositions.forEach((pos, i) => {
      // Root system (below ground)
      const rootGeom = new THREE.CylinderGeometry(0.3, 0.8, 8, 8);
      const rootMat = new THREE.MeshStandardMaterial({
        color: 0x4a3020,
        emissive: 0x1a0a08,
        roughness: 0.9
      });
      const root = new THREE.Mesh(rootGeom, rootMat);
      root.position.set(pos.x, -5, pos.z);
      scene.add(root);
      
      // Connection node
      const nodeGeom = new THREE.SphereGeometry(0.8, 16, 16);
      const nodeMat = new THREE.MeshStandardMaterial({
        color: 0x2a6030,
        emissive: 0x0a2010,
        roughness: 0.7,
        metalness: 0.2
      });
      const node = new THREE.Mesh(nodeGeom, nodeMat);
      node.position.set(pos.x, 0, pos.z);
      node.userData = { isTree: true, index: i, connected: false };
      trees.push(node);
      scene.add(node);
      
      // Connection point glow (dim until connected)
      const glowLight = new THREE.PointLight(0x2aff6b, 0.5, 8);
      glowLight.position.set(pos.x, 0, pos.z);
      node.userData.light = glowLight;
      scene.add(glowLight);
    });
    
    // Rocks (obstacles)
    const rocks = [];
    const rockPositions = [
      { x: -8, z: 5, scale: 2 },
      { x: 10, z: -5, scale: 1.5 },
      { x: -5, z: -20, scale: 2.5 },
      { x: 15, z: 8, scale: 1.8 },
      { x: -18, z: 0, scale: 2.2 },
      { x: 5, z: 18, scale: 1.6 }
    ];
    
    rockPositions.forEach(pos => {
      const rockGeom = new THREE.DodecahedronGeometry(pos.scale, 0);
      const rockMat = new THREE.MeshStandardMaterial({
        color: 0x3a3a40,
        emissive: 0x0a0a10,
        roughness: 0.95,
        metalness: 0.1
      });
      const rock = new THREE.Mesh(rockGeom, rockMat);
      rock.position.set(pos.x, -1, pos.z);
      rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
      rock.userData = { isRock: true, radius: pos.scale * 1.5 };
      rocks.push(rock);
      scene.add(rock);
    });
    
    // Toxic patches
    const toxics = [];
    const toxicPositions = [
      { x: -12, z: -8, scale: 4 },
      { x: 8, z: 12, scale: 3.5 },
      { x: -20, z: 10, scale: 3 }
    ];
    
    toxicPositions.forEach(pos => {
      const toxicGeom = new THREE.CircleGeometry(pos.scale, 32);
      const toxicMat = new THREE.MeshBasicMaterial({
        color: 0x20ff40,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
      });
      const toxic = new THREE.Mesh(toxicGeom, toxicMat);
      toxic.rotation.x = -Math.PI / 2;
      toxic.position.set(pos.x, -1.4, pos.z);
      toxic.userData = { isToxic: true, radius: pos.scale };
      toxics.push(toxic);
      scene.add(toxic);
      
      // Toxic glow
      const toxicGlow = new THREE.PointLight(0x20ff40, 1, pos.scale * 2);
      toxicGlow.position.set(pos.x, 0, pos.z);
      scene.add(toxicGlow);
    });
    
    // Tendril system
    const tendrils = [];
    const maxTendrils = 12;
    
    class Tendril {
      constructor(startPos, direction) {
        this.nodes = [startPos.clone()];
        this.direction = direction.clone().normalize();
        this.growing = true;
        this.alive = true;
        this.connectedTreeIndex = -1;
        
        // Create visual
        this.geometry = new THREE.BufferGeometry();
        this.material = new THREE.LineBasicMaterial({
          color: 0x6a9fff,
          transparent: true,
          opacity: 0.9,
          linewidth: 2
        });
        this.line = new THREE.Line(this.geometry, this.material);
        scene.add(this.line);
        
        // Glow line
        this.glowMaterial = new THREE.LineBasicMaterial({
          color: 0x00ffff,
          transparent: true,
          opacity: 0.4,
          linewidth: 4
        });
        this.glowLine = new THREE.Line(this.geometry.clone(), this.glowMaterial);
        scene.add(this.glowLine);
        
        // Tip glow
        this.tipLight = new THREE.PointLight(0x00ffff, 1, 5);
        scene.add(this.tipLight);
      }
      
      grow(delta, targetDir) {
        if (!this.growing || !this.alive) return;
        
        // Blend direction toward mouse
        this.direction.lerp(targetDir, 0.05);
        this.direction.normalize();
        
        // Add new node
        const lastNode = this.nodes[this.nodes.length - 1];
        const newNode = lastNode.clone().add(this.direction.clone().multiplyScalar(0.8));
        newNode.y = 0;
        
        // Check collisions
        let hitObstacle = false;
        
        // Rocks
        for (const rock of rocks) {
          const dist = newNode.distanceTo(rock.position);
          if (dist < rock.userData.radius) {
            hitObstacle = true;
            this.alive = false;
            this.growing = false;
            this.sever();
            break;
          }
        }
        
        // Toxic patches
        for (const toxic of toxics) {
          const dx = newNode.x - toxic.position.x;
          const dz = newNode.z - toxic.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < toxic.userData.radius) {
            hitObstacle = true;
            this.alive = false;
            this.growing = false;
            this.sever();
            break;
          }
        }
        
        if (!hitObstacle) {
          this.nodes.push(newNode);
          
          // Check tree connection
          for (const tree of trees) {
            const dist = newNode.distanceTo(tree.position);
            if (dist < 2 && !tree.userData.connected) {
              this.connectTree(tree);
            }
          }
          
          // Limit length
          if (this.nodes.length > 80) {
            this.nodes.shift();
          }
          
          this.updateGeometry();
        }
        
        // Update tip
        if (this.nodes.length > 0) {
          this.tipLight.position.copy(this.nodes[this.nodes.length - 1]);
        }
      }
      
      connectTree(tree) {
        tree.userData.connected = true;
        state.connectedTrees.add(tree.userData.index);
        state.treesConnected = state.connectedTrees.size;
        
        // Visual feedback
        tree.material.color.setHex(0x6aff9f);
        tree.material.emissive.setHex(0x2aff6b);
        tree.material.emissiveIntensity = 0.8;
        
        tree.userData.light.color.setHex(0x2aff6b);
        tree.userData.light.intensity = 2;
        
        this.connectedTreeIndex = tree.userData.index;
        
        // Play sound
        playConnectSound();
        
        // Check win
        if (state.treesConnected >= state.treesTotal) {
          endGame(true);
        }
        
        updateUI();
      }
      
      sever() {
        this.alive = false;
        this.growing = false;
        state.health = Math.max(0, state.health - 10);
        
        this.material.color.setHex(0xff3060);
        this.material.opacity = 0.5;
        this.glowMaterial.color.setHex(0xff3060);
        
        playDamageSound();
        updateUI();
      }
      
      updateGeometry() {
        const points = this.nodes.map(n => n.clone());
        this.geometry.setFromPoints(points);
        this.glowLine.geometry.setFromPoints(points);
      }
      
      update(delta, mouseWorld) {
        if (this.nodes.length === 0) return;
        
        const lastNode = this.nodes[this.nodes.length - 1];
        const dir = new THREE.Vector3(
          mouseWorld.x - lastNode.x,
          0,
          mouseWorld.z - lastNode.z
        );
        
        this.grow(delta, dir);
      }
      
      dispose() {
        scene.remove(this.line);
        scene.remove(this.glowLine);
        scene.remove(this.tipLight);
        this.geometry.dispose();
        this.material.dispose();
        this.glowGeometry?.dispose();
        this.glowMaterial.dispose();
      }
    }
    
    const { Vector2, Vector3 } = THREE;
    
    // Spawn initial tendrils
    function spawnTendril() {
      if (tendrils.length >= maxTendrils) return;
      
      const angle = Math.random() * Math.PI * 2;
      const direction = new Vector3(Math.cos(angle), 0, Math.sin(angle));
      const tendril = new Tendril(new Vector3(0, 0, 0), direction);
      tendrils.push(tendril);
    }
    
    // Spawn a few initial tendrils
    for (let i = 0; i < 4; i++) {
      spawnTendril();
    }
    
    // Audio setup
    let audioStarted = false;
    let synth, damageSynth;
    
    function initAudio() {
      if (audioStarted) return;
      
      Tone.start();
      
      synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.1, decay: 0.3, sustain: 0.4, release: 0.8 }
      }).toDestination();
      
      damageSynth = new Tone.MembraneSynth({
        pitchDecay: 0.05,
        octaves: 3,
        oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.4, sustain: 0, release: 0.4 }
      }).toDestination();
      
      damageSynth.volume.value = -10;
      
      audioStarted = true;
    }
    
    function playConnectSound() {
      if (!synth) return;
      synth.triggerAttackRelease(['C5', 'E5', 'G5'], '8n');
    }
    
    function playDamageSound() {
      if (!damageSynth) return;
      damageSynth.triggerAttackRelease('C2', '8n');
    }
    
    // Pointer handling
    function getEventPos(e) {
      const canvas = renderer.domElement;
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function onPointerMove(event) {
      const pos = getEventPos(event);
      state.mouseX = (pos.x / window.innerWidth) * 2 - 1;
      state.mouseY = -(pos.y / window.innerHeight) * 2 + 1;
    }
    
    function getMouseWorld() {
      const vector = new Vector3(state.mouseX, state.mouseY, 0.5);
      vector.unproject(camera);
      const dir = vector.sub(camera.position).normalize();
      const distance = -camera.position.y / dir.y;
      const pos = camera.position.clone().add(dir.multiplyScalar(distance));
      return pos;
    }
    
    // UI update
    function updateUI() {
      document.getElementById('trees-connected').textContent = state.treesConnected;
      document.getElementById('trees-total').textContent = state.treesTotal;
      document.getElementById('health').textContent = Math.round(state.health);
    }
    
    // Game end
    function endGame(won) {
      state.gameOver = true;
      state.won = won;
      
      const msg = document.getElementById('message');
      const txt = document.getElementById('message-text');
      msg.style.display = 'block';
      
      if (won) {
        txt.textContent = '🌿 NETWORK COMPLETE 🌿';
        txt.style.color = '#2aff6b';
      } else {
        txt.textContent = '❄️ WINTER CAME ❄️';
        txt.style.color = '#6a9fff';
      }
    }
    
    // Restart
    function restart() {
      state.treesConnected = 0;
      state.health = 100;
      state.timeLeft = 60;
      state.gameOver = false;
      state.won = false;
      state.connectedTrees.clear();
      
      // Reset trees
      trees.forEach((tree, i) => {
        tree.userData.connected = false;
        tree.material.color.setHex(0x2a6030);
        tree.material.emissive.setHex(0x0a2010);
        tree.material.emissiveIntensity = 0;
        tree.userData.light.color.setHex(0x2aff6b);
        tree.userData.light.intensity = 0.5;
      });
      
      // Reset tendrils
      tendrils.forEach(t => t.dispose());
      tendrils.length = 0;
      for (let i = 0; i < 4; i++) {
        spawnTendril();
      }
      
      document.getElementById('message').style.display = 'none';
      updateUI();
    }
    
    // Pointer events for mouse + touch input
    const canvas = renderer.domElement;
    window.addEventListener('pointermove', onPointerMove);

    canvas.addEventListener('pointerdown', (e) => {
      initAudio();
      if (state.gameOver) {
        restart();
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      onPointerMove(e);
    });

    canvas.addEventListener('pointerup', (e) => {
      // Handled by pointermove
    });
    
    canvas.addEventListener('pointercancel', (e) => {
      // Handled by pointermove
    });
    
    // Window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Timer
    let lastTime = performance.now();
    setInterval(() => {
      if (!state.gameOver && state.timeLeft > 0) {
        state.timeLeft--;
        document.getElementById('timer').textContent = state.timeLeft;
        
        if (state.timeLeft <= 0) {
          endGame(false);
        }
      }
    }, 1000);
    
    // Spawn new tendrils periodically
    setInterval(() => {
      if (!state.gameOver && tendrils.length < maxTendrils) {
        spawnTendril();
      }
    }, 3000);
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      const now = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime = now;
      
      // Spore pulse
      const pulse = Math.sin(now * 0.002) * 0.2 + 1;
      spore.scale.setScalar(pulse);
      sporeGlow.intensity = 2 + Math.sin(now * 0.003) * 0.5;
      
      // Update tendrils
      if (!state.gameOver) {
        const mouseWorld = getMouseWorld();
        tendrils.forEach(t => t.update(delta, mouseWorld));
      }
      
      // Rotate toxic patches
      toxics.forEach((t, i) => {
        t.rotation.z += delta * 0.2;
        t.material.opacity = 0.2 + Math.sin(now * 0.002 + i) * 0.1;
      });
      
      // Camera slight movement
      camera.position.x = Math.sin(now * 0.0001) * 2;
      camera.lookAt(0, 0, 0);
      
      renderer.render(scene, camera);
    }
    
    updateUI();
    animate();
  </script>
</body>
